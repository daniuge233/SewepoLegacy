<!DOCTYPE UTF-8>
<html>

<head>
    <title>six</title>

    <link rel="stylesheet" type="text/css" href="./css/template.css">
    <link rel="stylesheet" type="text/css" href="./css/index.css">
    <link rel="stylesheet" type="text/css" href="./css/qweather-icons.css">

    <script src="./js/jquery.js"></script>
    <script src="./js/functions.js"></script>
    <script src="./js/background.js"></script>
    <script src="./js/index.js"></script>

    <meta charset="UTF-8">
</head>

<body id="body" class="body_custom">

    <div id="input_panel" class="input_panel_hidden">
        <div class="input">
            <div class="input_txt">
                <input id="input" type="text" required="">
                <label>
                    <span>图片链接</span>
                </label>
            </div>
    
            <div class="input_btn" onclick="DefBackground_confirm()">确认</div>
        </div>
    </div>

    <div id="content">
        <div class="content_top">
            <div class="box " id="time">
                <div class="container">
                    <span class="timer">11 : 45 : 14</span>
                    <span class="dater"></span>
                </div>
            </div>

            <div class="box" id="weather">
                <div class="container">
                    <i class="" id="weather-icon"></i>
                    <div id="weatherInfoContainer">
                        <div class="weatherMainInfo">
                            <span class="weatherer"></span>
                            <span class="day"></span>
                        </div>
                        <span class="weatherother"></span>
                    </div>
                </div>
            </div>

            <div id="btnContainer" class="box">
                <div class="box btn" id="changewallpaper" onclick="SetBackground()">
                    <div class="container">
                        随机壁纸
                    </div>
                </div>

                <div class="box btn" id="defineWallpaper" onclick="DefBackground()">
                    <div class="container">
                        自定义
                    </div>
                </div>

                <div class="box btn" id="gu" onclick="location.reload()">
                    <div class="container">
                        全局刷新
                    </div>
                </div>
            </div>

        </div>

        <div class="content_bottom" id="calendar_container">
            <!-- <div class="box" id="calendarInfoContainer">
                <span id="calendarInfoContainer_content">123456</span>
            </div> -->
            <div class="box container" id="calendar">
                <!-- 这里存储的是今日的课表，自动获取 -->
            </div>
        </div>

    </div>
</body>

</html>
